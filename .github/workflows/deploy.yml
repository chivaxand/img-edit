name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to run at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Compilers
        run: npm install -g esbuild typescript

      - name: Create dist directory
        run: mkdir -p dist

      - name: Prepare Production Build
        run: |
          echo "Removing test files..."
          rm -rf tests/
          rm -f filters/test-ui.ts
          
          echo "Removing test imports from main.ts..."
          sed -i '/import.*tests\/index/d' main.ts
          sed -i '/window.*Tests = Tests/d' main.ts
          
          echo "Regenerating module indexes..."
          node gen-code.js

      - name: Compile and Bundle JS
        run: |
          tsc --noEmit
          esbuild main.ts --bundle --outfile=dist/bundle.js --minify

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Inline Assets (Merge Script & CSS)
        run: |
          python merge.py
          mv _img-edit.html index.html

      - name: Prepare Deployment Directory
        run: |
          mkdir -p public
          mv index.html public/
          # Add .nojekyll to bypass GitHub Pages Jekyll processing
          # which can fail if source files contain Liquid tags like {{ }}
          touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4